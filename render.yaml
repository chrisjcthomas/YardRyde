services:
  - type: web
    name: transit-tracker
    runtime: docker
    plan: free
    envVars:
      - key: PORT
        value: 8080
      - key: TRANSIT_DATA_SOURCE
        value: mta
      - key: MTA_BUSTIME_API_KEY
        sync: false
      - key: VITE_GOOGLE_MAPS_BROWSER_KEY
        sync: false
