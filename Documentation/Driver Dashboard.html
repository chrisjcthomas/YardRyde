<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Simplified Driver Portal</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#17a14e",
              "primary-dark": "#12823e",
              "hackathon-bg": "#1a3a2e", // Requested background
              "card-bg": "#142d24", // Slightly darker for contrast
              "accent-yellow": "#FFD700", 
            },
            fontFamily: {
              "display": ["Public Sans", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
            animation: {
              'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
              'ping-slow': 'ping 2s cubic-bezier(0, 0, 0.2, 1) infinite',
            }
          },
        },
      }
    </script>
<style>::-webkit-scrollbar {
    width: 8px
    }
::-webkit-scrollbar-track {
    background: #1a3a2e
    }
::-webkit-scrollbar-thumb {
    background: #2d4a3e;
    border-radius: 4px
    }
</style>
</head>
<body class="bg-hackathon-bg font-display text-white h-screen flex flex-col overflow-hidden">
<header class="w-full p-6 flex justify-between items-center z-10">
<div class="flex items-center gap-3">
<div>
<h1 class="text-xl font-bold tracking-tight text-white leading-tight">Kingston Transit</h1>
<p class="text-xs text-gray-300 font-medium tracking-wide uppercase">DRIVER PORTAL V2.4</p>
</div>
</div>
<button class="group flex items-center gap-2 px-4 py-2 rounded-lg bg-black/20 border border-white/10 hover:bg-white/10 transition-all duration-200">
<span class="material-icons-round text-gray-300 group-hover:text-white transition-colors text-sm">logout</span>
<span class="text-sm font-medium text-gray-300 group-hover:text-white transition-colors">Exit Driver Mode</span>
</button>
</header>
<main class="flex-1 flex flex-col items-center justify-center p-6 relative z-10 w-full max-w-4xl mx-auto">
<div class="w-full max-w-md flex flex-col items-center">
<div class="w-full bg-card-bg border border-white/10 shadow-2xl shadow-black/40 rounded-2xl p-8 relative overflow-hidden mb-8">
<div class="mb-8">
<label class="block text-xs font-bold text-primary uppercase tracking-wider mb-2" for="route-select">Select Active Route</label>
<div class="relative">
<select class="w-full bg-hackathon-bg text-white text-lg py-3 pl-4 pr-10 rounded-xl border border-white/10 focus:border-primary focus:ring-1 focus:ring-primary appearance-none cursor-pointer transition-colors hover:border-white/20" id="route-select">
<option disabled="" selected="" value="">Select a route...</option>
<option value="76">76 - Half Way Tree to UWI</option>
<option value="83">83 - Downtown to Cross Roads</option>
<option value="99">99 - Harbour View to New Kgn</option>
<option value="101">101 - Papine to Downtown</option>
</select>
<div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none text-gray-400">
<span class="material-icons-round text-2xl">expand_more</span>
</div>
</div>
</div>
<div class="flex justify-center mb-6 relative">
<button class="relative z-10 w-40 h-40 rounded-full bg-primary hover:bg-primary-dark active:scale-95 text-white font-bold shadow-[0_0_30px_rgba(23,161,78,0.5)] transition-all duration-300 flex flex-col items-center justify-center group border-4 border-hackathon-bg ring-4 ring-primary/30">
<span class="material-icons-round text-5xl mb-2 group-hover:scale-110 transition-transform">podcasts</span>
<span class="text-sm uppercase tracking-widest font-bold">Start</span>
</button>
</div>
<div class="text-center space-y-1">
<div class="text-xl font-bold text-white tracking-tight flex items-center justify-center gap-2 mb-2">
<span class="text-primary">🟢</span>
                        BROADCASTING...
                    </div>
<div class="text-xs font-mono text-gray-300">
                        LAT: 17.9924° N / LNG: 76.7815° W
                    </div>
<div class="text-xs text-accent-yellow font-medium mt-1">
                        ⚡ Updated 2s ago
                    </div>
</div>
</div>
<div class="flex items-center gap-3 bg-card-bg px-5 py-3 rounded-full border border-white/5 shadow-lg">
<div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer border-gray-600 checked:right-0 checked:border-primary peer" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-5 rounded-full bg-gray-700 cursor-pointer peer-checked:bg-primary/50" for="toggle"></label>
</div>
<label class="text-sm text-gray-300 font-mono cursor-pointer select-none" for="toggle">
                    DEV: Simulate GPS Data
                </label>
</div>
</div>
</main>
<style>
        .toggle-checkbox:checked {
            right: 0;
            border-color: #17a14e;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: rgba(23, 161, 78, 0.3);
        }
        .toggle-checkbox {
            right: 1.25rem;transition: all 0.3s;
        }
    </style>

</body></html>
