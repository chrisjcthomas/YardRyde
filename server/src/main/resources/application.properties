# Spring Boot HTTP server port (for REST endpoints like /health)
server.port=${PORT:8080}

# Socket.IO server configuration
socketio.host=0.0.0.0
socketio.port=${SOCKETIO_PORT:3001}

# Bus simulator update interval (ms)
simulator.update-interval=${SIMULATOR_UPDATE_INTERVAL:2000}

# Report expiration (minutes)
reports.max-age-minutes=30

# PostgreSQL datasource (requires running PostgreSQL instance)
# Uncomment when database is available:
# spring.datasource.url=jdbc:postgresql://localhost:5432/transit_tracker
# spring.datasource.username=postgres
# spring.datasource.password=postgres
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.jpa.hibernate.ddl-auto=update
# spring.jpa.show-sql=false
# spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable JPA/JDBC auto-configuration (no database required for in-memory mode)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.orm.jpa.HibernateJpaAutoConfiguration,org.springframework.boot.autoconfigure.data.jpa.JpaRepositoriesAutoConfiguration

# GTFS-RT data source: "simulator" for Kingston mock data, "mta" for live NYC MTA feed
transit.data-source=${TRANSIT_DATA_SOURCE:simulator}
transit.mta.api-key=${MTA_BUSTIME_API_KEY:}
transit.mta.feed-url=https://gtfsrt.prod.obanyc.com/vehiclePositions?key=${MTA_BUSTIME_API_KEY:}

# NYC Bus Time aggregation
mta.bustime.api-key=${MTA_BUSTIME_API_KEY:}
mta.bustime.base-url=https://api.prod.obanyc.com/api/where
mta.bustime.stop-monitoring-url=https://bustime.mta.info/api/siri/stop-monitoring.json
mta.bustime.cache-ttl-ms=10000

# Logging
logging.level.com.transit.tracker=DEBUG
